<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    >
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
      integrity="sha512-q6WgHqiHlKyOqslT/lgBgodhd03Wp4BEqKeW6nNtlOY4quzyG3VoQKFrieaCeSnuVseNKRGpGeDU3qPmabCANg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    >
    <link rel="stylesheet" href="./css/main.css">
    <title>E-Sheba</title>
  </head>
  <body>
    <!-- #region Header-->
    <header id="header" class="header">
      <div class="container">
        <a class="header__logo" href="#">E-<span class="accent">sheba</span></a>
        <nav class="header__nav">
          <ul class="header__nav-list">
            <li class="header__nav-item">
              <a href="#" class="header__nav-link active">Home</a>
            </li>
            <li class="header__nav-item">
              <a href="#" class="header__nav-link">About</a>
            </li>
            <li class="header__nav-item">
              <a href="#" class="header__nav-link">Application</a>
            </li>
            <li class="header__nav-item">
              <a href="#" class="header__nav-link">History</a>
            </li>
          </ul>
        </nav>

        <div class="header__auth-block">
          <button type="button" class="header__login-btn">Log in</button>
          <button type="button" class="header__signup-btn">Sign up</button>
        </div>
      </div>
    </header>
    <!-- #endregion -->

    <!-- #region Main-->
    <main>
      <section id="hero" class="hero">
        <div class="container">
          <h1 class="hero__title">
            Find & Search Your <span class="accent">Favourite</span> Doctor
          </h1>
          <p class="hero__description">
            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sem velit
            viverra amet faucibus.
          </p>
          <div class="hero__location-block">
            <div class="hero__location-doctor">
              <svg width="16px" height="16px">
                <use xlink:href="./images/icons.svg#icon-user"></use>
              </svg>
              <p class="hero__location-doctor-name">Doctor&rsquo;s Name</p>
              <svg width="8px" height="8px">
                <use xlink:href="./images/icons.svg#icon-dropdown"></use>
              </svg>
            </div>
            <div class="hero__location">
              <svg width="16px" height="16px">
                <use xlink:href="./images/icons.svg#icon-location"></use>
              </svg>
              <p class="hero__location-name">Location</p>
              <svg width="8px" height="8px">
                <use xlink:href="./images/icons.svg#icon-dropdown"></use>
              </svg>
            </div>
            <button type="button" class="hero__search-btn">
              <svg width="16px" height="16px">
                <use xlink:href="./images/icons.svg#icon-search"></use>
              </svg>
            </button>
          </div>
        </div>

        <svg class="hero__figure" width="800px" height="380px">
          <use xlink:href="./images/icons.svg#icon-ellipse"></use>
        </svg>
      </section>

      <div class="hero__statistic">
        <div class="container">
          <div class="hero__statistics-block">
            <p class="hero__statistic-value">24/7</p>
            <p class="hero__statistic-desription">Online Support</p>
          </div>
          <div class="hero__statistics-block">
            <p class="hero__statistic-value">100+</p>
            <p class="hero__statistic-desription">Doctors</p>
          </div>
          <div class="hero__statistics-block">
            <p class="hero__statistic-value">1M+</p>
            <p class="hero__statistic-desription">Active Patients</p>
          </div>
        </div>

        <img
          class="hero__splash-image"
          src="./images/doctor.png"
          alt="doctor"
          width="526"
          height="735"
        >
      </div>
    </main>
    <!-- #endregion -->

    <!-- #region Footer-->
    <footer></footer>
    <!-- #endregion -->
  </body>
</html>
